name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset: speedia-darwin-arm64
          - os: macos-13
            asset: speedia-darwin-amd64
          - os: ubuntu-22.04
            asset: speedia-linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: python -m pip install pyinstaller requests
      - name: Build binary
        run: pyinstaller --onefile --name speedia speedia.py
      - name: Rename asset
        run: mv dist/speedia dist/${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir out
          find dist -type f -maxdepth 2 -exec mv {} out/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
